openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CipNime API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: anime
    description: Anime operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /anime/home:
    get:
      operationId: getAnimeHome
      tags: [anime]
      summary: Get home page anime list
      description: Returns popular, ongoing, and recent anime from Otakudesu
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeHomeResponse"
  /anime/popular:
    get:
      operationId: getAnimePopular
      tags: [anime]
      summary: Get popular anime list
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeListResponse"
  /anime/recent:
    get:
      operationId: getAnimeRecent
      tags: [anime]
      summary: Get recent anime episodes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeListResponse"
  /anime/search:
    get:
      operationId: searchAnime
      tags: [anime]
      summary: Search anime by keyword
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search keyword
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeListResponse"
  /anime/genres:
    get:
      operationId: getAnimeGenres
      tags: [anime]
      summary: Get anime genre list
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenreListResponse"
  /anime/genre/{genre}:
    get:
      operationId: getAnimeByGenre
      tags: [anime]
      summary: Get anime by genre
      parameters:
        - name: genre
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeListResponse"
  /anime/detail/{slug}:
    get:
      operationId: getAnimeDetail
      tags: [anime]
      summary: Get anime detail
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeDetailResponse"
  /anime/episode/{slug}:
    get:
      operationId: getAnimeEpisode
      tags: [anime]
      summary: Get anime episode streaming URLs
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimeEpisodeResponse"
  /anime/schedule:
    get:
      operationId: getAnimeSchedule
      tags: [anime]
      summary: Get anime airing schedule
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnimeItem:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        poster:
          type: string
        episode:
          type: string
        rating:
          type: string
        type:
          type: string
        status:
          type: string
        genres:
          type: array
          items:
            type: string
      required:
        - title
        - slug
    AnimeHomeResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            popular:
              type: array
              items:
                $ref: "#/components/schemas/AnimeItem"
            recent:
              type: array
              items:
                $ref: "#/components/schemas/AnimeItem"
            ongoing:
              type: array
              items:
                $ref: "#/components/schemas/AnimeItem"
      required:
        - success
        - data
    AnimeListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/AnimeItem"
      required:
        - success
        - data
    Genre:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
      required:
        - name
        - slug
    GenreListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Genre"
      required:
        - success
        - data
    Episode:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        date:
          type: string
      required:
        - title
        - slug
    AnimeDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            title:
              type: string
            poster:
              type: string
            synopsis:
              type: string
            type:
              type: string
            status:
              type: string
            episodes:
              type: string
            duration:
              type: string
            rating:
              type: string
            studios:
              type: string
            genres:
              type: array
              items:
                type: string
            episodeList:
              type: array
              items:
                $ref: "#/components/schemas/Episode"
      required:
        - success
        - data
    StreamUrl:
      type: object
      properties:
        quality:
          type: string
        url:
          type: string
      required:
        - quality
        - url
    AnimeEpisodeResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            title:
              type: string
            prev:
              type: string
            next:
              type: string
            streamUrls:
              type: array
              items:
                $ref: "#/components/schemas/StreamUrl"
      required:
        - success
        - data
    ScheduleDay:
      type: object
      properties:
        day:
          type: string
        anime:
          type: array
          items:
            $ref: "#/components/schemas/AnimeItem"
      required:
        - day
        - anime
    ScheduleResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleDay"
      required:
        - success
        - data
